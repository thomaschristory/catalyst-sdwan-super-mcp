services:
  sdwan-mcp:
    build: .
    image: catalyst-sdwan-super-mcp:latest
    env_file: .env
    environment:
      - VMANAGE_USERNAME=${VMANAGE_USERNAME}
      - VMANAGE_PASSWORD=${VMANAGE_PASSWORD}
      - SDWAN_MCP_TOKEN=${SDWAN_MCP_TOKEN}
    volumes:
      - ./specs:/app/specs:ro
      - ./sdwan-mcp.yaml:/app/sdwan-mcp.yaml:ro
    # Default for compose: SSE transport on 8000 (network-accessible)
    command: ["--transport", "sse", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped

