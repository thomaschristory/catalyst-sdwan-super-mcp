name: Feature request
description: Propose a new capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is the user-facing problem you're trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would the ideal solution look like?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
