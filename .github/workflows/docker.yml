name: docker

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "sdwan_mcp/**"
      - ".github/workflows/docker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push, smoke test only)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: catalyst-sdwan-super-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test — image prints help
        run: docker run --rm catalyst-sdwan-super-mcp:ci --help
