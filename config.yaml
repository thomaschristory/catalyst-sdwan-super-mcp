vmanage:
  # Cisco SD-WAN Sandbox defaults — replace with your own deployment.
  # https://devnetsandbox.cisco.com/RM/Diagram/Index/c9679e44-d4c8-4dc5-b1b4-92e36f3da46b
  host: sandbox-sdwan-2.cisco.com
  port: 443
  verify_ssl: false
  username: "${VMANAGE_USERNAME}"
  password: "${VMANAGE_PASSWORD}"
  use_jwt: true            # 20.15+ supports the modern JWT endpoint; set false to force session
  timeout: 30.0            # per-request httpx timeout (seconds)
  retries:
    max_attempts: 3        # total attempts incl. first try; 1 disables retries
    statuses: [502, 503, 504]
    backoff_base: 0.5      # seconds; first backoff is base * 2**0 with jitter
    backoff_cap: 8.0       # upper bound on a single backoff
    retry_mutating: false  # default: only GET is retried (POST/PUT/DELETE/PATCH may not be idempotent)

sdwan:
  specs_dir: ./specs
  active_version: "20.18"
  max_actions_per_tool: 150  # adaptive splitter cap; 0 disables splitting (one tool per section)
  pagination:
    enabled: true
    max_pages: 5
    page_size: null

transport:
  mode: stdio                       # stdio | sse | streamable-http
  host: 127.0.0.1
  port: 8000
  # HTTP transports (sse, streamable-http) only:
  #   type: none    → no auth. Auto-demoted to 127.0.0.1 if host is non-loopback,
  #                   unless you also pass --insecure-allow-public.
  #   type: bearer  → require `Authorization: Bearer <token>` on every request.
  #                   token must be non-empty (use ${ENV_VAR} interpolation).
  auth:
    type: none
    # token: "${SDWAN_MCP_TOKEN}"
